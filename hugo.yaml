baseurl: "https://merry-kheer-74befa.netlify.app/"  # please update this to your actual URL
languageCode: "en-us"
title: "The Global Journal by Sitesh"
theme: "hugo-xmin"
googleAnalytics: ""
disqusShortname: ""
ignoreFiles: ["\\.Rmd$", "\\.Rmarkdown$", "_cache$"]
footnotereturnlinkcontents: "↩"

permalinks:
  note: "/note/:year/:month/:day/:slug/"
  post: "/post/:year/:month/:day/:slug/"

menu:
  main:
    - name: Home
      url: ""
      weight: 1
    - name: Tech
      url: "tech/"
      weight: 2
    - name: Travel
      url: "travel/"
      weight: 3
    - name: Culture
      url: "culture/"
      weight: 4
    - name: Ideas
      url: "ideas/"
      weight: 5
    - name: Books
      url: "books/"
      weight: 6
    - name: About
      url: "about/"
      weight: 7

params:
  footer: "&copy; [Sitesh Pattanaik](https://your-site.netlify.app) {Year}"

markup:
  highlight:
    codeFences: false
  goldmark:
    renderer:
      unsafe: true
    extensions:
      passthrough:
        enable: true
        delimiters:
          block:
          - - \[
            - \]
          - - $$
            - $$
          inline:
          - - \(
            - \)
